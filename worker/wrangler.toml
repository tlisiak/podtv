name = "podvision-rss-proxy"
main = "src/index.js"
compatibility_date = "2026-04-01"

[vars]
CACHE_TTL = "3600"

[observability]
enabled = true
head_sampling_rate = 1

# ─── Environment overrides ──────────────────────────────────────
# Deploy staging:    wrangler deploy --env staging
# Deploy production: wrangler deploy --env production
#
# Each env gets its own script name and can be bound to a custom route.

[env.staging]
name = "podvision-rss-proxy-staging"

[env.staging.vars]
CACHE_TTL = "300"

[env.production]
name = "podvision-rss-proxy"
# routes = [{ pattern = "rss.podvision.fm/*", zone_name = "podvision.fm" }]

[env.production.vars]
CACHE_TTL = "3600"

# Optional: KV for persistent caching across worker restarts.
# [[env.production.kv_namespaces]]
# binding = "RSS_CACHE"
# id = "your-kv-namespace-id"
